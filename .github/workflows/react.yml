name: HTML Website CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check website files
        run: |
          test -f index.html
          test -f style.css
          test -f script.js
          echo "All required files are present."

      - name: List project files
        run: ls -R